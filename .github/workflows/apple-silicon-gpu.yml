name: Apple Silicon GPU validation

on:
  workflow_dispatch:

jobs:
  gpu-validation:
    runs-on: [self-hosted, macOS, ARM64, aether-gpu]
    steps:
      - uses: actions/checkout@v4
      - name: Configure app and offline shaders
        run: cmake --preset debug -DAETHER_REQUIRE_METAL_TOOLCHAIN=ON
      - name: Build
        run: cmake --build --preset debug --parallel
      - name: Test
        run: ctest --preset debug
